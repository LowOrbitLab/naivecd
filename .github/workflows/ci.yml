name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck -x install.sh tests/*.sh

  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n install.sh
      - name: Run test suite
        run: |
          for t in tests/lib_functions.sh tests/high_priority.sh tests/caddy_validation_output.sh; do
            echo "::group::$t"
            bash "$t"
            echo "::endgroup::"
          done
